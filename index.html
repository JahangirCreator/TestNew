<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корпоративный Дашборд Посещаемости</title>
    
    <style>
        body { 
            font-family: 'Aptos', 'Segoe UI', Tahoma, sans-serif; 
            background-color: #594700; /* Темно-желтый / горчичный фон */
            color: #2d3748; 
            padding: 20px; 
            margin: 0; 
        }
        .container { 
            max-width: 1300px; 
            margin: 0 auto; 
            background: #fffdf5; /* Кремово-белый фон дашборда */
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.2); 
        }
        h1 { margin-top: 0; color: #4a3800; font-size: 24px; }
        .subtitle { color: #705b00; font-size: 14px; margin-bottom: 25px; }

        /* Панель фильтров и поиска */
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .search-box, .filter-box {
            flex: 1;
            min-width: 250px;
        }
        label {
            display: block;
            font-weight: 600;
            font-size: 13px;
            color: #5c4700;
            margin-bottom: 5px;
        }
        input, select {
            width: 100%;
            padding: 10px 14px;
            font-size: 14px;
            border: 1px solid #d4c37a;
            border-radius: 8px;
            outline: none;
            background: #fff;
            box-sizing: border-box;
            font-family: 'Aptos', sans-serif;
        }
        input:focus, select:focus {
            border-color: #9c7c00;
        }

        /* Таблица */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid #e2dbb8;
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            text-align: left; 
            font-size: 13px;
            white-space: nowrap;
        }
        th, td { 
            padding: 12px 15px; 
            border-bottom: 1px solid #eef2f7; 
        }
        th { 
            background-color: #735d00; /* Темно-желтый заголовок таблицы */
            color: white; 
            font-weight: 600; 
        }
        
        /* Цвета строк и статусов */
        tr:nth-child(even) { 
            background-color: #faf8ed; 
        }
        tr:hover {
            background-color: #f4efd6;
        }

        /* Эффект мигания (пульсации) красным цветом для опоздавших */
        @keyframes blinkLate {
            0% { background-color: #ffe6e6; }
            50% { background-color: #ffb3b3; }
            100% { background-color: #ffe6e6; }
        }
        tr.late-row {
            animation: blinkLate 1.8s infinite ease-in-out;
        }
        tr.late-row:hover {
            animation: none; /* При наведении мигание останавливается для удобства чтения */
            background-color: #ff9999 !important;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
        }
        .badge-face { background-color: #e6fffa; color: #319795; }
        .badge-finger { background-color: #f0fff4; color: #38a169; }
        
        /* Статусы опоздания */
        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-ontime { background-color: #c6f6d5; color: #22543d; }
        .status-late { background-color: #fed7d7; color: #9b2c2c; }

        /* Стильные логотипы компаний */
        .company-logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }
        .logo-icon {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
        }
        .logo-netant { background: linear-gradient(135deg, #667eea, #764ba2); }
        .logo-mediaforce { background: linear-gradient(135deg, #2193b0, #6dd5ed); }
        .logo-advert { background: linear-gradient(135deg, #eb3349, #f45c43); }
        .logo-poster { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .logo-banner { background: linear-gradient(135deg, #f2994a, #f2c94c); }
        .logo-omm { background: linear-gradient(135deg, #833ab4, #fd1d1d); }
        .logo-smartbee { background: linear-gradient(135deg, #f7b733, #fc4a1a); }

        .status-bar {
            margin-top: 15px;
            font-size: 13px;
            color: #705b00;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

        </div>

        <!-- Таблица данных -->
        <div class="table-responsive">
            <table>

                        <th>Статус прихода</th>
                        <th>Работник</th>

                        <th>Дверь</th>
                        <th>Число</th>
                        <th>Компания</th>

            </table>
        </div>

        <div class="status-bar">

            <span>Статус API: <strong style="color: #2f855a;">● Онлайн (Connected)</strong></span>
        </div>
    </div>

        ];

        function renderTable(data) {
            const tbody = document.getElementById('logTableBody');
            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" style="text-align: center; color: #a0aec0; padding: 20px;">Записи не найдены</td></tr>`;
                document.getElementById('rowCount').innerText = `Показано записей: 0`;
                return;
            }

            data.forEach(item => {
                let isLate = item.time > "10:00:00";
                let statusText = isLate ? "Опоздал" : "Не опоздал";
                let statusClass = isLate ? "status-late" : "status-ontime";
                let rowClass = isLate ? "late-row" : "";

                let badgeClass = item.method.includes('Face') ? 'badge-face' : 'badge-finger';
                
                let row = `<tr class="${rowClass}">
                    <td><strong>${item.office}</strong></td>
                    <td><span style="font-family: monospace; font-weight: bold; color: #735d00;">${item.time}</span></td>
                    <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                    <td>${item.employee}</td>
                    <td><span class="badge ${badgeClass}">${item.method}</span></td>
                    <td>${item.door}</td>
                    <td>${item.date}</td>
                    <td>
                        <div class="company-logo">
                            <div class="logo-icon ${item.logoClass}">${item.logoText}</div>
                            <span>${item.company}</span>
                        </div>
                    </td>
                </tr>`;
                tbody.innerHTML += row;
            });

            document.getElementById('rowCount').innerText = `Показано записей: ${data.length}`;
        }

        function filterTable() {
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            const selectedCompany = document.getElementById('companyFilter').value;

            const filtered = logsData.filter(item => {
                const matchesSearch = item.employee.toLowerCase().includes(searchText);
                const matchesCompany = selectedCompany === "" || item.company === selectedCompany;
                return matchesSearch && matchesCompany;
            });

            renderTable(filtered);
        }

        // Первичная загрузка
        renderTable(logsData);
