<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нефтяной Дашборд - Цены и Динамика</title>
    
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background-color: #f4f6f9; 
            color: #333; 
            padding: 20px; 
            margin: 0; 
        }
        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
        }
        h1 { margin-top: 0; color: #1a365d; font-size: 24px; }
        h2 { color: #2b6cb0; font-size: 18px; margin-top: 30px; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; }
        
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            margin-top: 15px;
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            text-align: center; 
            font-size: 13px;
            white-space: nowrap;
        }
        th, td { 
            padding: 10px 12px; 
            border: 1px solid #e2e8f0; 
        }
        th { 
            background-color: #2b6cb0; 
            color: white; 
            font-weight: 600; 
        }
        tr:nth-child(even) { 
            background-color: #f7fafc; 
        }
        .brand-name {
            text-align: left;
            font-weight: bold;
            background-color: #edf2f7;
        }
        .positive { color: #38a169; font-weight: bold; }
        .negative { color: #e53e3e; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>📊 Нефтяной рынок: Аналитический дашборд</h1>
        <p style="color: #666; font-size: 14px;">Данные мониторинга марок нефти за июль 2026 года в онлайн-режиме.</p>

        <h2>1. Oil brand cost, USD (Ежедневная стоимость)</h2>
        <div class="table-responsive">
            <table id="costTable">
                </table>
        </div>

        <h2>2. Oil brand cost, daily dynamic (Изменение к предыдущему дню)</h2>
        <div class="table-responsive">
            <table id="dynamicTable">
                </table>
        </div>
    </div>

    <script>
        // Исходные данные по дням июля (пример цифр на основе вашей структуры)
        // Даты от 2026-07-01 до 2026-07-23
        const dates = [
            '2026-07-01', '2026-07-02', '2026-07-03', '2026-07-04', '2026-07-05', 
            '2026-07-06', '2026-07-07', '2026-07-08', '2026-07-09', '2026-07-10', 
            '2026-07-11', '2026-07-12', '2026-07-13', '2026-07-14', '2026-07-15', 
            '2026-07-16', '2026-07-17', '2026-07-18', '2026-07-19', '2026-07-20', 
            '2026-07-21', '2026-07-22', '2026-07-23'
        ];

        // Цены марок по дням (null означает, что данных за этот день еще нет)
        const rawData = {
            "Brent":      [85.2, 85.8, 84.9, 85.1, 85.5, 86.2, 85.9, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null],
            "WTI":        [81.5, 82.0, 81.2, 81.6, 81.9, 82.5, 82.1, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null],
            "Dubai Crude":[79.8, 80.3, 79.5, 79.9, 80.2, 80.8, 80.4, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null],
            "Urals":      [74.1, 74.6, 73.9, 74.2, 74.5, 75.1, 74.8, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null]
        };

        function renderTables() {
            // --- РЕНДЕР ТАБЛИЦЫ 1 (Стоимость) ---
            let costHtml = `<thead><tr><th>Марка нефти</th>`;
            dates.forEach(date => costHtml += `<th>${date}</th>`);
            costHtml += `</tr></thead><tbody>`;

            for (let brand in rawData) {
                costHtml += `<tr><td class="brand-name">${brand}</td>`;
                rawData[brand].forEach(val => {
                    costHtml += `<td>${val !== null ? val.toFixed(2) : '-'}</td>`;
                });
                costHtml += `</tr>`;
            }
            costHtml += `</tbody>`;
            document.getElementById('costTable').innerHTML = costHtml;


            // --- РЕНДЕР ТАБЛИЦЫ 2 (Динамика: Сегодня - Вчера) ---
            let dynamicHtml = `<thead><tr><th>Марка нефти</th>`;
            dates.forEach(date => dynamicHtml += `<th>${date}</th>`);
            dynamicHtml += `</tr></thead><tbody>`;

            for (let brand in rawData) {
                dynamicHtml += `<tr><td class="brand-name">${brand}</td>`;
                let prices = rawData[brand];
                
                prices.forEach((val, index) => {
                    if (index === 0 || val === null || prices[index - 1] === null) {
                        dynamicHtml += `<td>-</td>`; // Для первого дня нет предыдущего
                    } else {
                        let diff = val - prices[index - 1];
                        let formattedDiff = diff > 0 ? `+${diff.toFixed(2)}` : diff.toFixed(2);
                        let cssClass = diff > 0 ? 'positive' : (diff < 0 ? 'negative' : '');
                        dynamicHtml += `<td class="${cssClass}">${formattedDiff}</td>`;
                    }
                });
                dynamicHtml += `</tr>`;
            }
            dynamicHtml += `</tbody>`;
            document.getElementById('dynamicTable').innerHTML = dynamicHtml;
        }

        // Запускаем отрисовку таблиц при загрузке
        renderTables();
    </script>
</body>
</html>
