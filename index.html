<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корпоративный Дашборд Посещаемости</title>
    
    <style>
        body { 
            font-family: 'Aptos', 'Segoe UI', Tahoma, sans-serif; 
            background-color: #594700; /* Темно-желтый / горчичный фон */
            color: #2d3748; 
            padding: 20px; 
            margin: 0; 
        }
        .container { 
            max-width: 1250px; 
            margin: 0 auto; 
            background: #fffdf5; /* Кремово-белый фон дашборда */
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.2); 
        }
        h1 { margin-top: 0; color: #4a3800; font-size: 24px; }
        .subtitle { color: #705b00; font-size: 14px; margin-bottom: 25px; }

        /* Панель фильтров и поиска */
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .search-box, .filter-box {
            flex: 1;
            min-width: 250px;
        }
        label {
            display: block;
            font-weight: 600;
            font-size: 13px;
            color: #5c4700;
            margin-bottom: 5px;
        }
        input, select {
            width: 100%;
            padding: 10px 14px;
            font-size: 14px;
            border: 1px solid #d4c37a;
            border-radius: 8px;
            outline: none;
            background: #fff;
            box-sizing: border-box;
            font-family: 'Aptos', sans-serif;
        }
        input:focus, select:focus {
            border-color: #9c7c00;
        }

        /* Таблица */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid #e2dbb8;
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            text-align: left; 
            font-size: 13px;
            white-space: nowrap;
        }
        th, td { 
            padding: 12px 15px; 
            border-bottom: 1px solid #eef2f7; 
        }
        th { 
            background-color: #735d00; /* Темно-желтый заголовок таблицы */
            color: white; 
            font-weight: 600; 
        }
        tr:nth-child(even) { 
            background-color: #faf8ed; 
        }
        tr:hover {
            background-color: #f4efd6;
        }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
        }
        .badge-face { background-color: #e6fffa; color: #319795; }
        .badge-finger { background-color: #f0fff4; color: #38a169; }

        /* Стильные логотипы компаний */
        .company-logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }
        .logo-icon {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
        }
        /* Уникальные цвета для логотипов компаний */
        .logo-netant { background: linear-gradient(135deg, #667eea, #764ba2); }
        .logo-mediaforce { background: linear-gradient(135deg, #2193b0, #6dd5ed); }
        .logo-advert { background: linear-gradient(135deg, #eb3349, #f45c43); }
        .logo-poster { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .logo-banner { background: linear-gradient(135deg, #f2994a, #f2c94c); }
        .logo-omm { background: linear-gradient(135deg, #833ab4, #fd1d1d); }
        .logo-smartbee { background: linear-gradient(135deg, #f7b733, #fc4a1a); }

        .status-bar {
            margin-top: 15px;
            font-size: 13px;
            color: #705b00;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>

    </div>
