<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нефтяной Дашборд - Цены и Динамика</title>
    
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background-color: #f4f6f9; 
            color: #333; 
            padding: 20px; 
            margin: 0; 
        }
        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
        }
        h1 { margin-top: 0; color: #1a365d; font-size: 24px; }
        h2 { color: #2b6cb0; font-size: 18px; margin-top: 35px; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; }
        
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            margin-top: 15px;
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            text-align: center; 
            font-size: 13px;
            white-space: nowrap;
        }
        th, td { 
            padding: 10px 12px; 
            border: 1px solid #cbd5e0; 
        }
        th { 
            background-color: #2b6cb0; 
            color: white; 
            font-weight: 600; 
        }
        tr:nth-child(even) { 
            background-color: #f7fafc; 
        }
        .brand-name {
            text-align: left;
            font-weight: bold;
            background-color: #edf2f7;
        }
        .positive { color: #276749; background-color: #f0fff4; font-weight: bold; }
        .negative { color: #9b2c2c; background-color: #fff5f5; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>📊 Мониторинг нефтяного рынка</h1>
        <p style="color: #666; font-size: 14px;">Оперативные данные стоимости марок нефти и расчет суточной динамики.</p>

        <h2>1. Oil brand cost, USD (Ежедневная стоимость)</h2>
        <div class="table-responsive">
            <table id="costTable"></table>
        </div>

        <h2>2. Oil brand cost, daily dynamic (Динамика изменения)</h2>
        <div class="table-responsive">
            <table id="dynamicTable"></table>
        </div>
    </div>

    <script>
        // Даты за июль из вашей таблицы (с 1 по 23 число)
        const dates = [
            '2026-07-01', '2026-07-02', '2026-07-03', '2026-07-04', '2026-07-05', 
            '2026-07-06', '2026-07-07', '2026-07-08', '2026-07-09', '2026-07-10', 
            '2026-07-11', '2026-07-12', '2026-07-13', '2026-07-14', '2026-07-15', 
            '2026-07-16', '2026-07-17', '2026-07-18', '2026-07-19', '2026-07-20', 
            '2026-07-21', '2026-07-22', '2026-07-23'
        ];

        // Данные по маркам (согласно вашему файлу заполнены первые дни, остальные пустые)
        const rawData = {
            "Brent":       [1.0, 2.0, 1.0, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null],
            "WTI":         [1.0, 3.0, 2.0, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null],
            "Dubai Crude": [2.0, 4.0, 1.0, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null],
            "Urals":       [1.0, 1.0, 1.0, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null]
        };

        function renderDashboard() {
            // --- РЕНДЕР ТАБЛИЦЫ 1 (Цены) ---
            let costHtml = `<thead><tr><th>Марка нефти</th>`;
            dates.forEach(date => costHtml += `<th>${date}</th>`);
            costHtml += `</tr></thead><tbody>`;

            for (let brand in rawData) {
                costHtml += `<tr><td class="brand-name">${brand}</td>`;
                rawData[brand].forEach(val => {
                    costHtml += `<td>${val !== null ? val.toFixed(2) : '-'}</td>`;
                });
                costHtml += `</tr>`;
            }
            costHtml += `</tbody>`;
            document.getElementById('costTable').innerHTML = costHtml;

            // --- РЕНДЕР ТАБЛИЦЫ 2 (Динамика: Сегодня - Вчера) ---
            let dynamicHtml = `<thead><tr><th>Марка нефти</th>`;
            dates.forEach(date => dynamicHtml += `<th>${date}</th>`);
            dynamicHtml += `</tr></thead><tbody>`;

            for (let brand in rawData) {
                dynamicHtml += `<tr><td class="brand-name">${brand}</td>`;
                let prices = rawData[brand];
                
                prices.forEach((val, index) => {
                    if (index === 0 || val === null || prices[index - 1] === null) {
                        dynamicHtml += `<td>-</td>`;
                    } else {
                        let diff = val - prices[index - 1];
                        let formattedDiff = diff > 0 ? `+${diff.toFixed(2)}` : diff.toFixed(2);
                        let cssClass = diff > 0 ? 'positive' : (diff < 0 ? 'negative' : '');
                        dynamicHtml += `<td class="${cssClass}">${formattedDiff}</td>`;
                    }
                });
                dynamicHtml += `</tr>`;
            }
            dynamicHtml += `</tbody>`;
            document.getElementById('dynamicTable').innerHTML = dynamicHtml;
        }

        renderDashboard();
    </script>
</body>
</html>
