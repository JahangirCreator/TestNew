<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивный дашборд нефти</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background-color: #f4f6f9; 
            color: #333; 
            padding: 20px; 
            margin: 0; 
        }
        .container { 
            max-width: 1000px; 
            margin: 0 auto; 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
        }
        h1 { margin-top: 0; color: #1a365d; font-size: 24px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 25px; }

        /* Стили для кнопок-переключателей */
        .nav-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        .nav-btn {
            background-color: #e2e8f0;
            color: #4a5568;
            border: none;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .nav-btn:hover {
            background-color: #cbd5e0;
        }
        .nav-btn.active {
            background-color: #2b6cb0;
            color: white;
            box-shadow: 0 4px 10px rgba(43, 108, 176, 0.3);
        }

        /* Контейнеры для графиков */
        .chart-container {
            display: none; /* По умолчанию скрыты */
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .chart-container.active {
            display: block; /* Показываем активный график */
        }
        .chart-container h3 {
            margin-top: 0;
            font-size: 18px;
            color: #2d3748;
            text-align: center;
            margin-bottom: 20px;
        }
        canvas {
            max-height: 400px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🛢️ Аналитический терминал нефтяного рынка</h1>
        <div class="subtitle">Выберите нужный срез данных с помощью кнопок управления ниже:</div>

        <div class="nav-buttons">
            <button class="nav-btn active" id="btn-cost" onclick="switchTab('cost')">1. Динамика стоимости марок нефти</button>
            <button class="nav-btn" id="btn-dynamic" onclick="switchTab('dynamic')">2. Суточное изменение цен</button>
        </div>

        <div class="chart-container active" id="tab-cost">
            <h3>📈 Динамика стоимости марок нефти (USD)</h3>
            <canvas id="costChart"></canvas>
        </div>

        <div class="chart-container" id="tab-dynamic">
            <h3>📊 Суточное изменение цен (Daily Dynamic)</h3>
            <canvas id="dynamicChart"></canvas>
        </div>
    </div>

    <script>
        // Исходные данные для демонстрации
        const dates = ['19 июля', '20 июля', '21 июля', '22 июля', '23 июля'];
        
        const marketData = {
            "Brent": [84.20, 84.90, 85.10, 84.60, 85.35],
            "WTI":   [80.50, 81.10, 81.40, 80.90, 81.70],
            "Dubai": [78.90, 79.40, 79.80, 79.20, 80.05],
            "Urals": [73.50, 74.00, 74.20, 73.80, 74.60]
        };

        const dynamicData = {
            "Brent": [0, 0.70, 0.20, -0.50, 0.75],
            "WTI":   [0, 0.60, 0.30, -0.50, 0.80],
            "Dubai": [0, 0.50, 0.40, -0.60, 0.85],
            "Urals": [0, 0.50, 0.20, -0.40, 0.80]
        };

        const colors = {
            "Brent": "#2b6cb0",
            "WTI": "#319795",
            "Dubai": "#d69e2e",
            "Urals": "#e53e3e"
        };

        // Функция переключения вкладок
        function switchTab(tabName) {
            // Убираем класс active у всех кнопок и вкладок
            document.getElementById('btn-cost').classList.remove('active');
            document.getElementById('btn-dynamic').classList.remove('active');
            document.getElementById('tab-cost').classList.remove('active');
            document.getElementById('tab-dynamic').classList.remove('active');

            // Включаем нужную кнопку и вкладку
            if (tabName === 'cost') {
                document.getElementById('btn-cost').classList.add('active');
                document.getElementById('tab-cost').classList.add('active');
            } else {
                document.getElementById('btn-dynamic').classList.add('active');
                document.getElementById('tab-dynamic').classList.add('active');
            }
        }

        // Инициализация графиков при загрузке страницы
        function initCharts() {
            // 1. Линейный график стоимости
            let costDatasets = [];
            for (let brand in marketData) {
                costDatasets.push({
                    label: brand,
                    data: marketData[brand],
                    borderColor: colors[brand],
                    backgroundColor: colors[brand],
                    borderWidth: 2,
                    tension: 0.2
                });
            }

            new Chart(document.getElementById('costChart').getContext('2d'), {
                type: 'line',
                data: { labels: dates, datasets: costDatasets },
                options: { responsive: true, scales: { y: { beginAtZero: false } } }
            });

            // 2. Столбиковый график суточной динамики
            let dynamicDatasets = [];
            for (let brand in dynamicData) {
                dynamicDatasets.push({
                    label: brand,
                    data: dynamicData[brand],
                    backgroundColor: colors[brand],
                    borderWidth: 1
                });
            }

            new Chart(document.getElementById('dynamicChart').getContext('2d'), {
                type: 'bar',
                data: { labels: dates, datasets: dynamicDatasets },
                options: { responsive: true, scales: { y: { beginAtZero: false } } }
            });
        }

        // Запускаем построение графиков
        initCharts();
    </script>
</body>
</html>
