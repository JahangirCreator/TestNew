<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корпоративный Дашборд Посещаемости (API Simulation)</title>
    
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background-color: #f4f6f9; 
            color: #333; 
            padding: 20px; 
            margin: 0; 
        }
        .container { 
            max-width: 1250px; 
            margin: 0 auto; 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
        }
        h1 { margin-top: 0; color: #1a365d; font-size: 24px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 25px; }

        /* Панель фильтров и поиска */
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .search-box, .filter-box {
            flex: 1;
            min-width: 250px;
        }
        label {
            display: block;
            font-weight: 600;
            font-size: 13px;
            color: #4a5568;
            margin-bottom: 5px;
        }
        input, select {
            width: 100%;
            padding: 10px 14px;
            font-size: 14px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            outline: none;
            background: #fff;
            box-sizing: border-box;
        }
        input:focus, select:focus {
            border-color: #2b6cb0;
        }

        /* Таблица */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            text-align: left; 
            font-size: 13px;
            white-space: nowrap;
        }
        th, td { 
            padding: 12px 15px; 
            border-bottom: 1px solid #e2e8f0; 
        }
        th { 
            background-color: #2b6cb0; 
            color: white; 
            font-weight: 600; 
        }
        tr:nth-child(even) { 
            background-color: #f7fafc; 
        }
        tr:hover {
            background-color: #edf2f7;
        }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
        }
        .badge-face { background-color: #ebf8ff; color: #3182ce; }
        .badge-finger { background-color: #f0fff4; color: #38a169; }
        
        .status-bar {
            margin-top: 15px;
            font-size: 13px;
            color: #718096;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🏢 WebOffice — Мониторинг проходов сотрудников</h1>
        <div class="subtitle">Интерактивная панель отслеживания посещаемости офисов в режиме реального времени (Эмуляция API).</div>

        <div class="controls">
            <div class="search-box">
                <label for="searchInput">🔍 Поиск по сотруднику:</label>
                <input type="text" id="searchInput" placeholder="Введите имя или фамилию..." onkeyup="filterTable()">
            </div>
            <div class="filter-box">
                <label for="companyFilter">🏢 Фильтр по компании:</label>
                <select id="companyFilter" onchange="filterTable()">
                    <option value="">Все компании</option>
                    <option value="NETANT MMC">NETANT MMC</option>
                    <option value="Mediaforce MMC">Mediaforce MMC</option>
                    <option value="ADVERT MMC">ADVERT MMC</option>
                    <option value="POSTER MMC">POSTER MMC</option>
                    <option value="BANNER MMC">BANNER MMC</option>
                    <option value="O.M.M. MMC">O.M.M. MMC</option>
                </select>
            </div>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Офис</th>
                        <th>Время</th>
                        <th>Работник</th>
                        <th>Способ входа</th>
                        <th>Дверь</th>
                        <th>Число</th>
                        <th>Компания</th>
                    </tr>
                </thead>
                <tbody id="logTableBody">
                    </tbody>
            </table>
        </div>

        <div class="status-bar">
            <span id="rowCount">Загрузка данных...</span>
            <span>Статус API: <strong style="color: #38a169;">● Онлайн (Connected)</strong></span>
        </div>
    </div>

    <script>
        // Массив данных, смоделированный на основе структуры вашей выгрузки weboffice.xlsx
        const logsData = [
            { office: "MediaForce", time: "10:30:39", employee: "Cəmilə Mirzəyeva Müzəffər", method: "👤 Face control", door: "Əsas giriş", date: "2026-07-24", company: "NETANT MMC" },
            { office: "MediaForce", time: "10:29:50", employee: "Qahira Tarverdiyeva Tarverdiyeva", method: "👆 Fingerprint", door: "Əsas giriş", date: "2026-07-24", company: "Mediaforce MMC" },
            { office: "SmartBEE", time: "10:28:21", employee: "Şəbnəm Xuraminacad Mirkazım", method: "👆 Fingerprint", door: "İkinci giriş", date: "2026-07-24", company: "NETANT MMC" },
            { office: "MediaForce", time: "10:27:39", employee: "İrina Bernadina Vladimirovna", method: "👤 Face control", door: "Əsas çıxış", date: "2026-07-24", company: "NETANT MMC" },
            { office: "MediaForce", time: "10:23:42", employee: "Tofiq Paşayev Fəxrəddin", method: "👤 Face control", door: "Əsas giriş", date: "2026-07-24", company: "O.M.M. MMC" },
            { office: "MediaForce", time: "10:23:36", employee: "Fərid Çıraqov Eldar", method: "👤 Face control", door: "Əsas giriş", date: "2026-07-24", company: "NETANT MMC" },
            { office: "SmartBEE", time: "10:12:17", employee: "Ayaz Əşrəfov Ələkbər", method: "👆 Fingerprint", door: "Əsas giriş", date: "2026-07-24", company: "ADVERT MMC" },
            { office: "POSTER", time: "10:08:43", employee: "Nigar Məmmədova Rauf", method: "👤 Face control", door: "Giriş", date: "2026-07-24", company: "POSTER MMC" },
            { office: "POSTER", time: "10:02:48", employee: "Nəzrin Abbaszadə Natiq", method: "👤 Face control", door: "Giriş", date: "2026-07-24", company: "POSTER MMC" },
            { office: "MediaForce", time: "10:02:27", employee: "Məleykə Məmmədova Mehman", method: "👤 Face control", door: "Əsas giriş", date: "2026-07-24", company: "ADVERT MMC" },
            { office: "Banner-2", time: "10:02:19", employee: "Afət Əliməmmədova Nurəddin", method: "👤 Face control", door: "-", date: "2026-07-24", company: "BANNER MMC" },
            { office: "Banner", time: "10:02:10", employee: "Nigar Həşimova Yaşar", method: "👤 Face control", door: "-", date: "2026-07-24", company: "BANNER MMC" },
            { office: "Banner", time: "10:01:28", employee: "Ruqayyə İbrahimova Sədrəddin", method: "👤 Face control", door: "-", date: "2026-07-24", company: "BANNER MMC" }
        ];

        // Функция отрисовки таблицы
        function renderTable(data) {
            const tbody = document.getElementById('logTableBody');
            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align: center; color: #a0aec0; padding: 20px;">Записи не найдены</td></tr>`;
                document.getElementById('rowCount').innerText = `Показано записей: 0`;
                return;
            }

            data.forEach(item => {
                let badgeClass = item.method.includes('Face') ? 'badge-face' : 'badge-finger';
                let row = `<tr>
                    <td><strong>${item.office}</strong></td>
                    <td><span style="font-family: monospace; font-weight: bold; color: #2b6cb0;">${item.time}</span></td>
                    <td>${item.employee}</td>
                    <td><span class="badge ${badgeClass}">${item.method}</span></td>
                    <td>${item.door}</td>
                    <td>${item.date}</td>
                    <td><span style="color: #4a5568; font-weight: 500;">${item.company}</span></td>
                </tr>`;
                tbody.innerHTML += row;
            });

            document.getElementById('rowCount').innerText = `Показано записей: ${data.length}`;
        }

        // Функция фильтрации (поиск + выбор компании)
        function filterTable() {
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            const selectedCompany = document.getElementById('companyFilter').value;

            const filtered = logsData.filter(item => {
                const matchesSearch = item.employee.toLowerCase().includes(searchText);
                const matchesCompany = selectedCompany === "" || item.company === selectedCompany;
                return matchesSearch && matchesCompany;
            });

            renderTable(filtered);
        }

        // Первичная загрузка
        renderTable(logsData);
    </script>
</body>
</html>
